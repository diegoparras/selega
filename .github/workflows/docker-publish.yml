name: Publicar imagen Docker (GHCR)

# Construye y publica la imagen en GitHub Container Registry en cada push a main y en cada tag vX.Y.Z.
# Luego, cualquier panel (Dokploy/Easypanel/Portainer/Coolify) la baja con:
#   docker pull ghcr.io/diegoparras/selega:latest

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Gate de calidad: ningún cruce se publica a :latest sin que los tests del núcleo pasen.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Instalar dependencias
        run: npm ci
      - name: Tests del núcleo (cruces + motor)
        run: npm test

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags / labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
